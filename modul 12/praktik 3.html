<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>praktik 3</title>
    <style>
        .box {
            position: fixed;
            width: 200px;
            height: 200px;
            bottom: 50px;
            left: 50px;
            background-color: #e3f2fd;
            border: 2px solid #007bff;
            border-radius: 16px;
            box-shadow: 5px 5px 5px rgb(0, 0, 0,0.5);
            cursor: grab;
            transition: all 0.3s;
        }

        .box:active {
            transform: translateY(-15px);
            box-shadow: none;
            width: 300px;
            height: 300px;
            background-color: #0e0f0f;
            border: 2px solid #0d437d;
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
