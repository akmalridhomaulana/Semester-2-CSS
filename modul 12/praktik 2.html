<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>praktik 2</title>
    <style>
        .container {
            position: relative;
            width: 300px;
            height: 300px;
            left: 50px;
            top: 40px;
            background-color: #007bff;
            border-radius: 16px;
            box-shadow: 5px 5px 5px rgb(0, 0, 0,0.5);
            cursor: grab;
            transition: all 0.3s;
        }

        .container:active {
            transform: translateY(-15px);
            box-shadow: none;
            width: 200px;
            height: 200px;
        }

        .box {
            position: absolute;
            top: 50px;
            left: 50px;
            background-color: rgb(106, 187, 249);
            width: 100px;
            height: 100px;
            border-radius: 16px;
            box-shadow: 5px 5px 5px rgb(0, 0, 0,0.5);
            cursor: grab;
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>
</html>
