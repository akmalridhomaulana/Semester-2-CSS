<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display 2</title>
    <style>
        .box {
            display: inline-block;
            width: 120px;
            height: 100px;
            background-color: orange;
            margin: 5px;
            text-align: center;
            line-height: 100px;
            border-radius: 12px;
            box-shadow: 5px 5px;
            margin-top: 30px;
            margin-left: 250px;
        }
    </style>
</head>
<body>
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</body>
</html>
