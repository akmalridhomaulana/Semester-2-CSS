<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugas</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #e3f2fd;
    }

    .navbar {
        background-color: #0d47a1; /* Biru Tua */
        padding: 20px;
        text-align: center;
    }

    .navbar ul {
        margin: 0;
        padding: 0;
        list-style-type: none;
    }

    .navbar li {
        display: inline-block;
        margin: 0 10px;
    }

    .navbar a {
        display: flex;
        text-decoration: none;
        color: white;
        font-weight: bold;
        padding: 10px 20px;
        background-color: #1976d2;
        border-radius: 5px;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .navbar a:hover {
        transform: translateY(-7px);
        box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        background-color: #64b5f6;
        color: #0d47a1;
    }

    .content {
        text-align: center;
        padding: 50px;
    }

    footer {
        text-align: center;
        margin-top: 100vh;
        margin-bottom: 30px;
    }
    </style>
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="#">Beranda</a></li>
            <li><a href="#">Profil</a></li>
            <li><a href="#">Galeri</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Kontak</a></li>
        </ul>
    </nav>

    <div class="content">
        <h2>Selamat Datang di Website akmal</h2>
        <p>selamat melihat lihat ya.</p>
    </div>

    <footer>

    </footer>
</body>
</html>
