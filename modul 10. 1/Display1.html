<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .block {
            display: block;
            background-color: lightblue;
            margin: 20px;
            padding: 15px;
            text-align: center;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .block:hover {
            transform: translateY(-7px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .inline{
            display: inline;
            background-color: lightblue;
            margin: 20px;
            padding: 15px;
            text-align: center;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .inline:hover {
            transform: translateX(-7px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <h2>Contoh Block</h2>
    <div class="block">Box 1</div>
    <div class="block">Box 2</div>

    <h2>Contoh Inline</h2>
    <span class="inline">Box A</span>
    <span class="inline">Box B</span>
</body>
</html>
