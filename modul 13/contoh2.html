<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contoh2</title>
    <style>
        p:first-child {
            color: blue;
            font-weight: bold;
            transition: all 0.3s;
            margin: 25px;
            cursor: pointer;
        }

        p:hover {
            width: 200px;
            border: 3px solid black;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 5px 5px 5px ;
            transform: translateY(-15px);
        }
    </style>
</head>
<body>
    <p>paragraf pertama</p>
    <p>paragraf kedua</p>
</body>
</html>
