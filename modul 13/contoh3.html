<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contoh3</title>
    <style>
        li:last-child {
            color: red;
            font-weight: bold;
            transition: all 0.3s;
            margin: 25px;
            cursor: pointer;
        }

        li:hover {
            width: 50px;
            border: 3px solid black;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 5px 5px 5px ;
            transform: translateY(-15px);
        }
    </style>
</head>
<body>
    <ul>
        <li>item 1</li>
        <li>item 1</li>
        <li>item terakhir</li>
    </ul>
</body>
</html>
