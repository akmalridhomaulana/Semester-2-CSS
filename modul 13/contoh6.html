<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contoh6</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h2 {
            margin-bottom: 50px;
        }
        .menu {
            text-align: center;
            width: 400px;
            background-color: black;
            overflow: hidden;
            border-radius: 60px;

        }
        .menu a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .menu a:hover {
            background-color: #4caf50;
            color: white;
            border-radius: 60px;
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <h2>contoh menu hover</h2>

    <div class="menu">
        <a href="#">beranda</a>
        <a href="#">tentang</a>
        <a href="#">layanan</a>
        <a href="#">kontak</a>
    </div>
</body>
</html>
