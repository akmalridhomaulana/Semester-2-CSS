<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contoh1</title>
    <style>
        button {
            margin-top: 50px ;
            margin-left: 50px;
            width: 100px;
            height: 50px;
            transition: all 0.3s;
        }
        button:hover {
            background-color: green;
            color: white;
            cursor: pointer;
            border: 3px solid black;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 5px 5px 5px ;
            transform: translateY(-15px);
        }

        button:active {
            background-color: red;
            color: white;
            cursor: pointer;
            border: 3px solid black;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 5px 5px 5px ;
            transform: translateY(+5px);
        }
    </style>
</head>
<body>
    <button>ok</button>
</body>
</html>
