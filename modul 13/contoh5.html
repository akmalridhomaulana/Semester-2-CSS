<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contoh5</title>
    <style>
        input {
            margin-top: 100px;
            margin-left: 100px;
            width: 200px;
            height: 50px;
            padding: 10px;
            transition: all 0.3s;
        }
        input:focus {
            border: none;
            background-color: rgb(3, 32, 249);
            color: white;
            width: 400px;
            height: 100px;
            font-size: 14pt;
            border-radius: 16px;
            box-shadow: 15px 15px 15px rgb(3, 32, 249);
            transform: translateY(-80px);
        }
    </style>
</head>
<body>
    <input type="text" placeholder="klik dan ketik disini">
</body>
</html>
