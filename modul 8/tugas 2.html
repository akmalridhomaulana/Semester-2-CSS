<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugas 2</title>
    <style>
        h3 {
            text-align: center;
            font-size: 24pt;
        }
        .kotak-besar {
            width: 400px;
            height: 300px;
            background-color: #add8e6;
            position: relative;
            margin: auto;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 5px 5px;
        }

        .kotak-kecil {
            width: 200px;
            height: 150px;
            background-color: #f08080;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <h3>kotak</h3>

    <div class="kotak-besar">
        <div class="kotak-kecil"></div>
    </div>
</body>
</html>
