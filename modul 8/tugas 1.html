<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugas 1</title>
    <style>
        h1 {
            font-size: 32px;
            color: #004080;
            text-align: center;
        }

        p {
            font-size: 12pt;
            color: #333;
            text-align: center;
        }

        .box-cm {
            width: 10cm;
            height: 5cm;
            background-color: #add8e6;
            margin-bottom: 20px;
            border: 1px solid blue;
            text-align: center;
            padding: 15px;
            margin: auto;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 5px 5px;
        }

        .box-persen {
            width: 50%;
            height: 100px;
            background-color: #87ceeb;
            border: 1px solid blue;
            text-align: center;
            padding: 15px;
            margin: auto;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 5px 5px;
        }
    </style>
</head>
<body>
    <h1>Menentukan Ukuran Elemen dengan Satuan yang Tepat</h1>
    
    <p>Ini adalah paragraf yang menggunakan satuan pt (12pt).</p>

    <div class="box-cm">
        Ini adalah Box dengan ukuran 10cm x 5cm.
    </div>

    <div class="box-persen">
        Ini adalah Box dengan lebar 50% dari layar.
    </div>
</body>
</html>
