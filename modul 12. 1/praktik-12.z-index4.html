<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>praktik-12.z-index4</title>
    <style>
        div {
            width: 200px;
            height: 200px;
            position: absolute;
            border-radius: 16px;
            box-shadow: 5px 5px 5px rgb(0, 0, 0,0.4);
            transition: all 0.3s;
        }

        .div1:active {
            width: 100px;
            height: 100px;
        }

        .div2:active {
            transform: translateY(-25px);
            box-shadow: none;
        }

        .div3:active {
            transform: translateX(25px);
            box-shadow: 10px 10px;
        }

        .div1 {
            background-color: salmon;
            z-index: 1;
            
        }

        .div2 {
            background-color: limegreen;
            top: 100px;
            left: 100px;
        }

        .div3 {
            background-color: royalblue;
            top: 200px;
            left: 200px;
        }
    </style>
</head>
<body>
    <div class="div1"></div>
    <div class="div2"></div>
    <div class="div3"></div>
</body>
</html>
