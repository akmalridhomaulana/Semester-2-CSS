<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugas</title>
    <style>
        div {
            width: 250px;
            height: 250px;
            position: absolute;
            border: 5px solid #0056b3;
            border-radius: 10px;
            background-color: white;
            box-shadow: 5px 5px 5px rgb(0, 0, 0,0.4);
            transition: all 0.3s;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gambar1 {
            z-index: 3;
            top: 50px;
            left: 50px;
            margin-top: 50px;
        }

        .gambar2 {
            z-index: 2;
            top: 120px;
            left: 120px;
            margin-top: 50px;
        }

        .gambar3 {
            z-index: 1;
            top: 190px;
            left: 190px;
            margin-top: 50px;
        }

        .gambar1:hover {
            width: 100px;
            height: 100px;
        }

        .gambar2:hover {
            transform: translateY(-25px);
            box-shadow: none;
        }

        .gambar3:hover {
            transform: translateX(25px);
            box-shadow: 10px 10px;
        }

        p {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0, 51, 102, 0.8); /* Biru Navy Transparan */
            color: white;
            margin: 0;
            text-align: center;
            padding: 5px 0;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <h2>Galeri foto</h2>

    <div class="gambar1">
        <a href="a.jpg">
            <img src="a.jpg" alt="Gambar 1">
        </a>
        <p>Gambar 1</p>
    </div>

    <div class="gambar2">
        <a href="b.jpeg">
            <img src="b.jpeg" alt="Gambar 2">
        </a>
        <p>Gambar 2</p>
    </div>

    <div class="gambar3">
        <a href="c.jpeg">
            <img src="c.jpeg" alt="Gambar 3">
        </a>
        <p>Gambar 3</p>
    </div>
</body>
</html>
