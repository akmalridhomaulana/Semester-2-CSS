<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>praktik10-float-right</title>
    <style>
        div {
            width: 200px;
            height: 200px;
            border: 3px solid black;
            border-radius: 16px;
            box-shadow: 10px 10px 10px rgb(0, 0, 0,0.4);
        }

        .box1 {
            background-color: salmon;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        .box2 {
            background-color: limegreen;
            margin-top: 15px;
            margin-bottom: 15px;
            float: right;
        }
        .box3 {
            background-color: lightskyblue;
            margin-top: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>
</html>
