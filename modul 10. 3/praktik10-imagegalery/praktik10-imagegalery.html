<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>praktik10-imagegalery</title>
    <style>
        div.gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            
        }

        h1 {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 50px;
        }
        div.gallery-item {
            margin: 15px;
            border: 1px solid #ccc;
            width: 380px;
            border-radius: 16px;
            box-shadow: 5px 5px 5px rgb(0, 0, 0,0.6);
            transition: all 0.3s ease-in-out;

        }
        div.gallery-item:hover {
            border: 3px solid #777;
            box-shadow: none;
            transform: translateY(-15px);
        }
        div.gallery-item img {
            width: 100%;
            height: auto;
            border-radius: 16px;
        }
        div.gallery-item div.desc {
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Image Gallery</h1>

    <div class="gallery">

        <div class="gallery-item">
            <a target="_blank" href="img_5terre.jpg.jpeg">
                <img src="img_5terre.jpg.jpeg" alt="Cinque Terre" width="600" height="400">
            </a>
            <div class="desc">Cinque Terre</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="img_forest.jpg.jpeg">
                <img src="img_forest.jpg.jpeg" alt="Forest" width="600" height="400">
            </a>
            <div class="desc">Green Forest</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="img_lights.jpg.jpeg">
                <img src="img_lights.jpg.jpeg" alt="Northern Lights" width="600" height="400">
            </a>
            <div class="desc">Northern Lights</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="img_mountains.jpg.jpeg">
                <img src="img_mountains.jpg.jpeg" alt="Mountains" width="600" height="400">
            </a>
            <div class="desc">Mountains</div>
        </div>

    </div>
</body>
</html>
