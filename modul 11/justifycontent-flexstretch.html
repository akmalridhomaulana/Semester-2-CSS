<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>justifycontent-flexstretch</title>
    <style>
        .contener {
            width: 600px;

            border: 3px solid black;
            margin: 30px;
            padding: 5px;
            display: flex;
            justify-content: stretch;
            text-align: center;
        }

        .contener div {
            width: 100px;
            height: 100px;
            background-color: rgb(255, 191, 0);
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="contener">
        <div class="satu">1</div>
        <div class="dua">2</div>
        <div class="tiga">3</div>
    </div>
</body>
</html>
