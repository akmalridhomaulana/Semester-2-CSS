<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-align-self</title>
    <style>
        .contener {
            width: 600px;

            border: 3px solid black;
            margin: 30px;
            padding: 5px;
            display: flex;
            justify-content: baseline;
            text-align: center;
        }

        .contener div {
            width: 100px;
            height: 100px;
            background-color: blue;
            margin: 2px;
            border-radius: 16px;
        }

        .contener div.dua{
            flex: 2;
            align-self: center;
        }
    </style>
</head>
<body>
    <div class="contener">
        <div class="satu">1</div>
        <div class="dua">2</div>
        <div class="tiga">3</div>
        <div class="empat">4</div>
    </div>
</body>
</html>
